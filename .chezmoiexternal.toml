# -------------------------------------------------------------------
# External sources managed by chezmoi
#
# These are fetched/cloned on `chezmoi apply` and are NOT stored in
# the dotfiles repo. `refreshPeriod` controls how often chezmoi will
# re-check for updates (0 = only on first apply / explicit --refresh-externals).
# -------------------------------------------------------------------

# -------------------------------------------------------------------
# Zsh plugins (live in ZSH_CUSTOM/plugins, i.e. ~/.config/zsh/custom/plugins/)
# -------------------------------------------------------------------

[".config/zsh/custom/plugins/zsh-syntax-highlighting"]
  type          = "git-repo"
  url           = "https://github.com/zsh-users/zsh-syntax-highlighting.git"
  refreshPeriod = "168h"  # weekly

[".config/zsh/custom/plugins/zsh-autosuggestions"]
  type          = "git-repo"
  url           = "https://github.com/zsh-users/zsh-autosuggestions.git"
  refreshPeriod = "168h"

[".config/zsh/custom/plugins/zsh-bat"]
  type          = "git-repo"
  url           = "https://github.com/fdellwing/zsh-bat.git"
  refreshPeriod = "168h"

# -------------------------------------------------------------------
# Tmux Plugin Manager (TPM)
# Plugins themselves are installed by TPM on first tmux launch via
# the `run '~/.tmux/plugins/tpm/tpm'` line in .tmux.conf
# -------------------------------------------------------------------

[".tmux/plugins/tpm"]
  type          = "git-repo"
  url           = "https://github.com/tmux-plugins/tpm.git"
  refreshPeriod = "168h"

# -------------------------------------------------------------------
