  role: { foreground: "#7dcfff" }          # Cyan
  typ: { foreground: "#7aa2f7" }           # Pastel Blue
  range: { foreground: "#bb9af7" }         # Purple
file_type:
  image: { foreground: "#7dcfff" }         # Cyan
  video: { foreground: "#7aa2f7" }         # Pastel Blue
  music: { foreground: "#73daca" }         # Bermuda Green
  lossless: { foreground: "#73daca" }      # Bermuda Green
  crypto: { foreground: "#f7768e" }        # Pastel Pink
  document: { foreground: "#c0caf5" }      # White
  compressed: { foreground: "#ff9e64" }    # Pastel Orange
  temp: { foreground: "#414868" }          # Black
  compiled: { foreground: "#414868" }      # Black
  build: { foreground: "#73daca" }         # Bermuda Green
  source: { foreground: "#bb9af7" }        # Purple
punctuation: { foreground: "#414868" }     # Black
date: { foreground: "#c6c6c6" }            # Yellow
inode: { foreground: "#414868" }           # Black
blocks: { foreground: "#414868" }          # Black
header: { foreground: "#c0caf5" }          # White
octal: { foreground: "#ff9e64" }           # Pastel Orange
flags: { foreground: "#bb9af7" }           # Purple
symlink_path: { foreground: "#7dcfff" }    # Cyan
control_char: { foreground: "#ff9e64" }    # Pastel Orange
broken_symlink: { foreground: "#f7768e" }  # Pastel Pink
broken_path_overlay: { foreground: "#f7768e" } # Pastel Pink
extensions:
  md:
    filename:
      foreground: "#7aa2f7"               # Pastel Blue (fixed typo from "foregroupd")
    icon:
      glyph: 📘
      foreground: "#7aa2f7"               # Pastel Blue
  rs: {filename: {foreground: Red}, icon: {glyph: 🦀}}
  # Change the icon glyph and color
  nix: {icon: {glyph: ❄, style: {foreground: White}}}
filenames:
  pyproject.toml:
    icon:
      glyph: 
      style:
        foreground: "#e0af68" 
    filename:
      foreground: "#e0af68"
  Cargo.toml: {icon: {glyph: 🦀}}
  Cargo.lock: {icon: {glyph: 🦀}}


